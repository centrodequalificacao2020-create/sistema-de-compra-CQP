{% extends "base.html" %}
{% block content %}

<div class="container mt-4" style="max-width:600px">

    <h4 class="fw-bold mb-3">Editar Funcionário</h4>

    <form method="POST" class="card shadow p-4">

        <div class="mb-3">
            <label>Nome</label>
            <input type="text" name="nome" value="{{ usuario.nome }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" value="{{ usuario.email }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Perfil</label>
            <select name="perfil" class="form-select">
                <option value="usuario" {% if usuario.perfil=='usuario' %}selected{% endif %}>Usuário</option>
                <option value="aprovador" {% if usuario.perfil=='aprovador' %}selected{% endif %}>Aprovador</option>
                <option value="admin" {% if usuario.perfil=='admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-success">Salvar</button>
            <a href="{{ url_for('funcionarios') }}" class="btn btn-secondary">Voltar</a>
        </div>

    </form>

</div>

{% endblock %}
