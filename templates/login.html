<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema CQP - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: radial-gradient(circle at top left, #1f1f2e, #0d0d15 60%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(25, 25, 40, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .login-title {
            font-weight: 700;
            color: #ffffff;
        }

        .subtitle {
            font-size: 13px;
            color: #9ca3af;
        }

        .form-control {
            background: #1e1e2f;
            border: 1px solid #2a2a40;
            color: #fff;
            border-radius: 10px;
            padding: 12px;
        }

        .form-control:focus {
            background: #1e1e2f;
            color: #fff;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,.25);
        }

        .form-label {
            color: #cbd5e1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99,102,241,.5);
        }

        .footer-text {
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="text-center mb-4">
        <h3 class="login-title">Sistema de Compras</h3>
        <div class="subtitle">CQP Cursos</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} text-center">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Digite seu email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2">
            Entrar no Sistema
        </button>
    </form>

    <div class="text-center mt-4 footer-text">
        © 2026 CQP Cursos
    </div>

</div>

</body>
</html>
